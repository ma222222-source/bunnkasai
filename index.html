<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 混雑状況＆校内マップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="bg-gradient-to-r from-indigo-700 to-purple-800 text-white p-5 text-center shadow-md">
      <h1 class="text-xl font-black tracking-wider">電子科 文化祭案内システム</h1>
      <p class="text-xs opacity-80 mt-1">リアルタイム混雑マップ（15秒自動更新）</p>
    </header>

    <main class="flex-1 p-4 space-y-6">
      <div id="loading-view" class="flex flex-col items-center justify-center py-24">
        <div class="animate-spin h-12 w-12 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-gray-500 font-bold text-sm tracking-widest">データを同期中...</p>
        <p id="debug-error" class="text-red-500 text-xs mt-4 max-w-xs text-center font-mono break-all hidden"></p>
      </div>

      <div id="auth-view" class="hidden py-10 text-center space-y-4">
        <h2 class="text-lg font-bold text-gray-700">管理者コントロール認証</h2>
        <input type="password" id="admin-password" placeholder="パスワードを入力" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-center focus:outline-none">
        <button onclick="verifyAdmin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">認証</button>
        <p id="auth-error" class="text-red-500 text-xs hidden">パスワードが正しくありません</p>
      </div>

      <div id="user-view" class="hidden space-y-6">
        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm">
          <h2 class="text-sm font-black text-gray-700 mb-3 flex items-center gap-1">🗺️ リアルタイム校内マップ</h2>
          <div id="dynamic-map-container" class="grid grid-cols-2 gap-3 p-2 bg-gray-200 rounded-xl"></div>
          <p class="text-[10px] text-gray-400 mt-2 text-center">※混雑度に応じてマップの色が自動で変わります。</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-sm font-black text-gray-700 flex items-center gap-1">📋 ブース一覧</h2>
          <div id="booth-list" class="space-y-3"></div>
        </div>
      </div>

      <div id="admin-view" class="hidden space-y-4">
        <div id="admin-booth-list" class="space-y-4"></div>
      </div>
    </main>

    <footer class="p-4 bg-gray-50 border-t border-gray-200 text-center text-xs text-gray-400 font-medium">
      &copy; 2026 黒沢尻工業高校 電子科 文化祭システム
    </footer>
  </div>

  <script>
    // --- 環境変数設定 ---
    const LIFF_ID = '2010429448-fUV9jRNs';
    // ⚠️ 下記のURLが最新のGASデプロイURLと一致しているか確認すること
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6uGuIsZCRB6fs-1MHkMJcNT0Zdnlta_1F0AiQ4FpIUBUyQ3OEMyqrBIu0eS0MOZXF/exec';
    const ADMIN_PASS = 'kuroko2026';

    let isAdminMode = false;
    let autoRefreshInterval = null;

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const liffState = urlParams.get('liff.state');
      if (urlParams.get('mode') === 'admin' || (liffState && liffState.includes('mode=admin'))) {
        isAdminMode = true;
      }
      initLiff();
    });

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        
        // ログイン完了を厳密に待ってから画面遷移とデータ取得を行う
        if (isAdminMode) {
          switchView('auth');
        } else {
          await fetchStatus();
          startAutoRefresh();
        }
      } catch (error) {
        showDebugError('LIFF初期化失敗: ' + error.message);
      }
    }

    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(() => {
        if (document.visibilityState === 'visible') {
          fetchStatus(true);
        }
      }, 15000);
    }

    function switchView(view) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('admin-view').classList.add('hidden');
      if (view === 'loading') document.getElementById('loading-view').classList.remove('hidden');
      if (view === 'auth') document.getElementById('auth-view').classList.remove('hidden');
      if (view === 'user') document.getElementById('user-view').classList.remove('hidden');
      if (view === 'admin') document.getElementById('admin-view').classList.remove('hidden');
    }

    function verifyAdmin() {
      if (document.getElementById('admin-password').value === ADMIN_PASS) {
        switchView('loading');
        fetchStatus().then(() => startAutoRefresh());
      } else {
        document.getElementById('auth-error').classList.remove('hidden');
      }
    }

    async function fetchStatus(isBackground = false) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        // セキュリティ制限を通過させるためのCORSリクエスト設定
        const response = await fetch(GAS_URL, { 
          method: 'GET',
          mode: 'cors',
          headers: { 'Accept': 'application/json' },
          signal: controller.signal 
        });
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error('HTTPエラーステータス: ' + response.status);
        const data = await response.json();

        if (isAdminMode) {
          renderAdminView(data);
        } else {
          renderUserView(data);
        }
      } catch (error) {
        if (!isBackground) showDebugError('通信エラー(load failed): ' + error.message);
      }
    }

    function showDebugError(msg) {
      const errEl = document.getElementById('debug-error');
      errEl.innerText = msg;
      errEl.classList.remove('hidden');
      const spinner = document.querySelector('.animate-spin');
      if (spinner) spinner.classList.add('hidden');
    }

    function renderUserView(data) {
      const listContainer = document.getElementById('booth-list');
      const mapContainer = document.getElementById('dynamic-map-container');
      
      listContainer.innerHTML = '';
      
      if (mapContainer.children.length === 0) {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const cell = document.createElement('div');
          cell.id = `map-cell-${cleanId}`;
          cell.className = `p-3 rounded-lg text-center font-black text-xs shadow-sm transition-all duration-500 ${getMapCellClass(booth.status)}`;
          cell.innerHTML = `
            <div>${booth.name}</div>
            <div id="map-status-${cleanId}" class="text-[10px] font-normal mt-1">${booth.status}</div>
          `;
          mapContainer.appendChild(cell);
        });
      }

      data.forEach(booth => {
        const cleanId = String(booth.id).trim();
        
        const card = document.createElement('div');
        card.className = 'p-4 bg-white rounded-xl shadow-sm border border-gray-100 flex justify-between items-center';
        card.innerHTML = `
          <div>
            <h3 class="text-sm font-bold text-gray-800">${booth.name}</h3>
            <p class="text-[10px] text-gray-400 mt-1">🕒 更新: ${formatTime(booth.time)}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-black ${getStatusBadgeClass(booth.status)}">
            ${getStatusEmoji(booth.status)} ${booth.status}
          </span>
        `;
        listContainer.appendChild(card);

        const cell = document.getElementById(`map-cell-${cleanId}`);
        const statusText = document.getElementById(`map-status-${cleanId}`);
        if (cell && statusText) {
          statusText.innerText = booth.status;
          cell.className = `p-3 rounded-lg text-center font-black text-xs shadow-sm transition-all duration-500 ${getMapCellClass(booth.status)}`;
        }
      });
      
      if(document.getElementById('user-view').classList.contains('hidden')) switchView('user');
    }

    function renderAdminView(data) {
      const container = document.getElementById('admin-booth-list');
      if (container.children.length === 0) {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const section = document.createElement('div');
          section.className = 'p-4 bg-gray-50 border border-gray-200 rounded-xl space-y-3';
          section.innerHTML = `
            <div class="flex justify-between items-center border-b border-gray-200 pb-2">
              <h3 class="text-sm font-bold text-gray-800">${booth.name}</h3>
              <span id="current-${cleanId}" class="px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(booth.status)}">${booth.status}</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="updateStatus('${cleanId}', '空いています', this)" class="bg-white hover:bg-green-50 text-green-600 border border-green-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">空き</button>
              <button onclick="updateStatus('${cleanId}', 'やや混雑', this)" class="bg-white hover:bg-yellow-50 text-yellow-600 border border-yellow-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">やや混雑</button>
              <button onclick="updateStatus('${cleanId}', '混雑しています', this)" class="bg-white hover:bg-red-50 text-red-600 border border-red-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">混雑</button>
            </div>
          `;
          container.appendChild(section);
        });
      } else {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const badge = document.getElementById(`current-${cleanId}`);
          if (badge && !badge.dataset.updating) {
            badge.innerText = booth.status;
            badge.className = `px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(booth.status)}`;
          }
        });
      }
      if(document.getElementById('admin-view').classList.contains('hidden')) switchView('admin');
    }

    async function updateStatus(id, newStatus, btnElement) {
      const badge = document.getElementById(`current-${id}`);
      if (badge) badge.dataset.updating = "true";
      const buttons = btnElement.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify({ id: id, status: newStatus })
        });
        const result = await response.json();
        if (result.status === 'success' && badge) {
          badge.innerText = newStatus;
          badge.className = `px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(newStatus)}`;
        }
      } catch (error) {
        alert('送信失敗');
      } finally {
        buttons.forEach(b => b.disabled = false);
        if (badge) delete badge.dataset.updating;
      }
    }

    function getStatusBadgeClass(status) {
      switch(status) {
        case '空いています': return 'bg-green-100 text-green-800';
        case 'やや混雑': return 'bg-yellow-100 text-yellow-800';
        case '混雑しています': return 'bg-red-100 text-red-800';
        default: return 'bg-gray-100 text-gray-800';
      }
    }

    function getMapCellClass(status) {
      switch(status) {
        case '空いています': return 'bg-green-500 text-white shadow-lg shadow-green-100';
        case 'やや混雑': return 'bg-yellow-400 text-gray-900 shadow-lg shadow-yellow-500/20';
        case '混雑しています': return 'bg-red-500 text-white shadow-lg shadow-red-500/40 animate-pulse';
        default: return 'bg-white text-gray-400';
      }
    }

    function getStatusEmoji(status) {
      switch(status) {
        case '空いています': return '🟢';
        case 'やや混雑': return '🟡';
        case '混雑しています': return '🔴';
        default: return '⚪';
      }
    }

    function formatTime(dateStr) {
      if (!dateStr) return '未更新';
      const diff = new Date() - new Date(dateStr);
      const mins = Math.floor(diff / 1000 / 60);
      if (mins < 1) return 'たった今';
      if (mins < 60) return `${mins}分前`;
      return new Date(dateStr).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
  </script>
</body>
</html>
