<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 混雑状況＆校内マップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="bg-gradient-to-r from-indigo-700 to-purple-800 text-white p-5 text-center shadow-md">
      <div class="flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wider text-left">電子科 文化祭案内システム</h1>
        <span id="connection-badge" class="bg-emerald-500 text-[10px] px-2 py-1 rounded-full font-bold">同期中</span>
      </div>
      <p class="text-xs opacity-80 mt-1 text-left">リアルタイム混雑マップ（15秒自動更新）</p>
    </header>

    <main class="flex-1 p-4 space-y-6">
      
      <div id="error-banner" class="hidden bg-rose-50 border-l-4 border-rose-500 p-3 rounded shadow-sm">
        <p class="text-xs text-rose-700 font-bold">🚨 同期一時失敗: 自動リトライ中...</p>
        <p id="error-details" class="text-[10px] text-rose-500 mt-1 font-mono"></p>
      </div>

      <div id="loading-view" class="flex flex-col items-center justify-center py-12">
        <div class="animate-spin h-12 w-12 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-gray-500 font-bold text-sm tracking-widest">データを同期中...</p>
      </div>

      <div id="auth-view" class="hidden py-10 text-center space-y-4">
        <h2 class="text-lg font-bold text-gray-700">管理者コントロール認証</h2>
        <input type="password" id="admin-password" placeholder="パスワードを入力" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-center focus:outline-none focus:border-indigo-500 transition">
        <button onclick="verifyAdmin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">認証</button>
        <p id="auth-error" class="text-red-500 text-xs hidden">パスワードが正しくありません</p>
      </div>

      <div id="user-view" class="hidden space-y-6">
        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm">
          <h2 class="text-sm font-black text-gray-700 mb-3 flex items-center gap-1">🗺️ リアルタイム校内マップ</h2>
          <div id="dynamic-map-container" class="grid grid-cols-2 gap-3 p-2 bg-gray-200 rounded-xl"></div>
          <p class="text-[10px] text-gray-400 mt-2 text-center">※混雑度に応じてマップの色が自動で変わります。</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-sm font-black text-gray-700 flex items-center gap-1">📋 ブース一覧</h2>
          <div id="booth-list" class="space-y-3"></div>
        </div>
      </div>

      <div id="admin-view" class="hidden space-y-4">
        <h2 class="text-sm font-black text-red-600 uppercase tracking-wide">🔧 管理者コンソール</h2>
        <div id="admin-booth-list" class="space-y-4"></div>
      </div>

    </main>

    <footer class="p-4 bg-gray-50 border-t border-gray-200 text-center text-xs text-gray-400 font-medium">
      &copy; 2026 黒沢尻工業高校 電子科 文化祭システム
    </footer>
  </div>

  <script>
    // 【最重要】ここに新しいGASのウェブアプリURLを貼り付ける
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyUZHslRZ6m6S57v25jhUfZy8m_tP6f_cjyunYr196zL6VTF03BHUKTJMZyAJ5q9WBd/exec';
    const ADMIN_PASS = 'kuroko2026';

    let isAdminMode = false;
    let cachedData = null;

    // 状態定義マトリクス
    const STATUS_MAP = {
      '空いています': { badge: 'bg-green-100 text-green-800', map: 'bg-green-500 text-white shadow-md', emoji: '🟢', text: '空き' },
      'やや混雑': { badge: 'bg-yellow-100 text-yellow-800', map: 'bg-yellow-400 text-gray-900 shadow-md', emoji: '🟡', text: 'やや混雑' },
      '混雑しています': { badge: 'bg-red-100 text-red-800', map: 'bg-red-500 text-white shadow-md animate-pulse', emoji: '🔴', text: '混雑' }
    };

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'admin') {
        isAdminMode = true;
        switchView('auth');
      } else {
        fetchStatus();
        setInterval(fetchStatus, 15000); 
      }
    });

    function switchView(view) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('admin-view').classList.add('hidden');
      if (view === 'loading') document.getElementById('loading-view').classList.remove('hidden');
      if (view === 'auth') document.getElementById('auth-view').classList.remove('hidden');
      if (view === 'user') document.getElementById('user-view').classList.remove('hidden');
      if (view === 'admin') document.getElementById('admin-view').classList.remove('hidden');
    }

    function verifyAdmin() {
      if (document.getElementById('admin-password').value === ADMIN_PASS) {
        switchView('loading');
        fetchStatus().then(() => setInterval(fetchStatus, 15000));
      } else {
        document.getElementById('auth-error').classList.remove('hidden');
      }
    }

    async function fetchStatus() {
      const errorBanner = document.getElementById('error-banner');
      const errorDetails = document.getElementById('error-details');
      const connectionBadge = document.getElementById('connection-badge');

      try {
        const response = await fetch(`${GAS_URL}?_=${Date.now()}`, {
          method: 'GET',
          mode: 'cors'
        });

        if (!response.ok) throw new Error(`HTTPエラー: ${response.status}`);
        
        const data = await response.json();

        if (!Array.isArray(data)) {
          if (data.status === 'error') throw new Error(`GAS内部エラー: ${data.message}`);
          throw new Error('データ構造が配列ではありません');
        }

        errorBanner.classList.add('hidden');
        connectionBadge.className = "bg-emerald-500 text-[10px] px-2 py-1 rounded-full font-bold";
        connectionBadge.textContent = "同期中";
        
        cachedData = data;

        if (isAdminMode) {
          renderAdminView(data);
        } else {
          renderUserView(data);
        }

      } catch (error) {
        console.error(error);
        errorBanner.classList.remove('hidden');
        errorDetails.textContent = error.message;
        connectionBadge.className = "bg-rose-500 text-[10px] px-2 py-1 rounded-full font-bold animate-pulse";
        connectionBadge.textContent = "切断";
        
        const loadingView = document.getElementById('loading-view');
        if (!loadingView.classList.contains('hidden') && !cachedData) {
          document.getElementById('booth-list').innerHTML = `<div class="text-center py-8 text-gray-400 text-xs">データ一時不通。電波の良い場所で自動再試行を待つか、アプリを再起動してください。</div>`;
          if (!isAdminMode) switchView('user');
        }
      }
    }

    function renderUserView(data) {
      const listContainer = document.getElementById('booth-list');
      const mapContainer = document.getElementById('dynamic-map-container');
      
      listContainer.innerHTML = '';

      if (mapContainer.children.length === 0) {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const cell = document.createElement('div');
          cell.id = `map-cell-${cleanId}`;
          const config = STATUS_MAP[booth.status] || { map: 'bg-white text-gray-400' };
          cell.className = `p-3 rounded-lg text-center font-black text-xs transition-all duration-500 ${config.map}`;
          cell.innerHTML = `
            <div>${booth.name}</div>
            <div id="map-status-${cleanId}" class="text-[10px] font-normal mt-1">${booth.status}</div>
          `;
          mapContainer.appendChild(cell);
        });
      }

      data.forEach(booth => {
        const cleanId = String(booth.id).trim();
        const config = STATUS_MAP[booth.status] || { badge: 'bg-gray-100 text-gray-800', emoji: '⚪', text: booth.status };
        
        const card = document.createElement('div');
        card.className = 'p-4 bg-white rounded-xl shadow-sm border border-gray-100 flex justify-between items-center';
        card.innerHTML = `
          <div>
            <h3 class="text-sm font-bold text-gray-800">${booth.name}</h3>
            <p class="text-[10px] text-gray-400 mt-1">🕒 更新: ${formatTime(booth.time)}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-black ${config.badge}">
            ${config.emoji} ${config.text}
          </span>
        `;
        listContainer.appendChild(card);

        const cell = document.getElementById(`map-cell-${cleanId}`);
        const statusText = document.getElementById(`map-status-${cleanId}`);
        if (cell && statusText) {
          statusText.innerText = booth.status;
          cell.className = `p-3 rounded-lg text-center font-black text-xs shadow-sm transition-all duration-500 ${STATUS_MAP[booth.status]?.map || 'bg-white text-gray-400'}`;
        }
      });
      
      switchView('user');
    }

    function renderAdminView(data) {
      const container = document.getElementById('admin-booth-list');
      if (container.children.length === 0) {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const config = STATUS_MAP[booth.status] || { badge: 'bg-gray-100 text-gray-800' };
          const section = document.createElement('div');
          section.className = 'p-4 bg-gray-50 border border-gray-200 rounded-xl space-y-3';
          section.innerHTML = `
            <div class="flex justify-between items-center border-b border-gray-200 pb-2">
              <h3 class="text-sm font-bold text-gray-800">${booth.name}</h3>
              <span id="current-${cleanId}" class="px-2 py-0.5 rounded text-xs font-bold ${config.badge}">${booth.status}</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="updateStatus('${cleanId}', '空いています', this)" class="bg-white hover:bg-green-50 text-green-600 border border-green-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">空き</button>
              <button onclick="updateStatus('${cleanId}', 'やや混雑', this)" class="bg-white hover:bg-yellow-50 text-yellow-600 border border-yellow-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">やや混雑</button>
              <button onclick="updateStatus('${cleanId}', '混雑しています', this)" class="bg-white hover:bg-red-50 text-red-600 border border-red-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">混雑</button>
            </div>
          `;
          container.appendChild(section);
        });
      } else {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const badge = document.getElementById(`current-${cleanId}`);
          if (badge && !badge.dataset.updating) {
            badge.innerText = booth.status;
            badge.className = `px-2 py-0.5 rounded text-xs font-bold ${STATUS_MAP[booth.status]?.badge || 'bg-gray-100 text-gray-800'}`;
          }
        });
      }
      switchView('admin');
    }

    async function updateStatus(id, newStatus, btnElement) {
      const badge = document.getElementById(`current-${id}`);
      if (badge) badge.dataset.updating = "true";
      const buttons = btnElement.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify({ id: id, status: newStatus })
        });
        const result = await response.json();
        if (result.status === 'success' && badge) {
          badge.innerText = newStatus;
          badge.className = `px-2 py-0.5 rounded text-xs font-bold ${STATUS_MAP[newStatus]?.badge || 'bg-gray-100 text-gray-800'}`;
        }
      } catch (error) {
        alert('送信失敗');
      } finally {
        buttons.forEach(b => b.disabled = false);
        if (badge) delete badge.dataset.updating;
      }
    }

    function formatTime(dateStr) {
      if (!dateStr) return '未更新';
      const diff = new Date() - new Date(dateStr);
      const mins = Math.floor(diff / 1000 / 60);
      if (mins < 1) return 'たった今';
      if (mins < 60) return `${mins}分前`;
      return new Date(dateStr).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
  </script>
</body>
</html>
