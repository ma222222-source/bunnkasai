<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 混雑状況管理システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-lg">
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5 text-center shadow-md">
      <h1 id="page-title" class="text-xl font-black tracking-wider">企業ブース 混雑状況</h1>
      <p id="page-subtitle" class="text-xs opacity-75 mt-1">リアルタイム案内板</p>
    </header>

    <main class="flex-1 p-5">
      <div id="loading-view" class="flex flex-col items-center justify-center py-10">
        <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
        <p class="text-gray-500 font-medium text-sm">データを同期中...</p>
        
        <div id="debug-box" class="w-full mt-6 p-4 bg-red-50 border border-red-200 rounded-lg text-left hidden">
          <p class="text-red-700 font-bold text-xs mb-1">【システムエラー検出】</p>
          <p id="debug-error" class="text-red-600 text-xs font-mono break-all"></p>
        </div>
      </div>

      <div id="auth-view" class="hidden py-10 text-center">
        <h2 class="text-lg font-bold text-gray-800 mb-4">管理者認証</h2>
        <input type="password" id="admin-password" placeholder="パスワードを入力" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="verifyAdmin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition shadow-md">認証する</button>
        <p id="auth-error" class="text-red-500 text-xs mt-2 hidden">パスワードが違います</p>
      </div>

      <div id="user-view" class="hidden space-y-4">
        <div id="booth-list" class="space-y-4"></div>
      </div>

      <div id="admin-view" class="hidden space-y-6">
        <div id="admin-booth-list" class="space-y-6"></div>
      </div>
    </main>

    <footer class="p-4 bg-gray-50 border-t border-gray-100 text-center text-xs text-gray-400">
      &copy; 2026 黒工 電子科 文化祭システム
    </footer>
  </div>

  <script>
    // --- 環境変数設定 ---
    const LIFF_ID = '2010429448-fUV9jRNs';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJqYnlWS7CzMdvOys9gazxyFmiWDj3ObOw3dAbU2argt30IhKvnuzHneHEj34IQmz6/exec';
    const ADMIN_PASS = 'kuroko2026';

    let isAdminMode = false;

    window.addEventListener('DOMContentLoaded', () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const liffState = urlParams.get('liff.state');
        
        if (urlParams.get('mode') === 'admin' || (liffState && liffState.includes('mode=admin'))) {
          isAdminMode = true;
        }
        initLiff();
      } catch (e) {
        showDebugError('URL解析エラー: ' + e.message);
      }
    });

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          const redirectUri = isAdminMode ? window.location.href : undefined;
          liff.login({ redirectUri: redirectUri });
          return;
        }
        
        if (isAdminMode) {
          switchView('auth');
        } else {
          fetchStatus();
        }
      } catch (error) {
        showDebugError('LIFF初期化エラー: ' + error.message + ' (LIFF IDがLINE Developersの設定と一致しているか確認してください)');
      }
    }

    function switchView(view) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('admin-view').classList.add('hidden');

      if (view === 'loading') {
        document.getElementById('loading-view').classList.remove('hidden');
      } else if (view === 'auth') {
        document.getElementById('page-title').innerText = '管理者コントロール';
        document.getElementById('page-subtitle').innerText = 'ブース専用更新画面';
        document.getElementById('auth-view').classList.remove('hidden');
      } else if (view === 'user') {
        document.getElementById('user-view').classList.remove('hidden');
      } else if (view === 'admin') {
        document.getElementById('page-title').innerText = '管理者コントロール';
        document.getElementById('page-subtitle').innerText = 'ブース専用更新画面';
        document.getElementById('admin-view').classList.remove('hidden');
      }
    }

    function verifyAdmin() {
      const input = document.getElementById('admin-password').value;
      if (input === ADMIN_PASS) {
        document.getElementById('auth-error').classList.add('hidden');
        switchView('loading');
        fetchStatus();
      } else {
        document.getElementById('auth-error').classList.remove('hidden');
      }
    }

    async function fetchStatus() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15秒に緩和

        // fetch実行前のログ明示
        console.log('Fetching to GAS...');
        
        const response = await fetch(GAS_URL, { 
          method: 'GET',
          mode: 'cors',
          signal: controller.signal 
        }).catch(err => {
          throw new Error('ネットワーク要求自体が拒否されました(CORSまたはGAS未公開): ' + err.message);
        });

        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error('GASがエラーコード ' + response.status + ' を返しました。');
        }

        const data = await response.json();
        
        if (isAdminMode) {
          renderAdminView(data);
        } else {
          renderUserView(data);
        }
      } catch (error) {
        if (error.name === 'AbortError') {
          showDebugError('通信タイムアウト: GASからの応答が15秒間ありません。GAS側の「新しいデプロイ」で「全員(Anyone)」になっているか確認してください。');
        } else {
          showDebugError('データ同期エラー: ' + error.message);
        }
      }
    }

    function showDebugError(msg) {
      document.getElementById('debug-box').classList.remove('hidden');
      const errEl = document.getElementById('debug-error');
      errEl.innerText = msg;
      const spinner = document.querySelector('.animate-spin');
      if (spinner) spinner.classList.add('hidden');
    }

    function renderUserView(data) {
      const container = document.getElementById('booth-list');
      container.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 text-sm py-10">表示できるデータ（配列）が空です。</p>';
        switchView('user');
        return;
      }

      data.forEach(booth => {
        const card = document.createElement('div');
        card.className = 'p-4 bg-white rounded-xl shadow-sm border border-gray-100 flex justify-between items-center';
        card.innerHTML = `
          <div>
            <h3 class="text-base font-bold text-gray-800">${booth.name}</h3>
            <p class="text-xs text-gray-400 mt-1">最終更新: ${formatTime(booth.time)}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-black ${getStatusClass(booth.status)}">
            ${booth.status}
          </span>
        `;
        container.appendChild(card);
      });

      switchView('user');
    }

    function renderAdminView(data) {
      const container = document.getElementById('admin-booth-list');
      container.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 text-sm py-10">操作できるデータが空です。</p>';
        switchView('admin');
        return;
      }

      data.forEach(booth => {
        const section = document.createElement('div');
        section.className = 'p-4 bg-gray-50 border border-gray-200 rounded-xl space-y-3';
        section.innerHTML = `
          <div class="flex justify-between items-center border-b border-gray-200 pb-2">
            <h3 class="text-base font-bold text-gray-800">${booth.name}</h3>
            <span id="current-${booth.id}" class="px-2 py-0.5 rounded text-xs font-bold ${getStatusClass(booth.status)}">${booth.status}</span>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="updateStatus('${booth.id}', '空いています', this)" class="bg-white hover:bg-green-50 text-green-600 border border-green-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">空き</button>
            <button onclick="updateStatus('${booth.id}', 'やや混雑', this)" class="bg-white hover:bg-yellow-50 text-yellow-600 border border-yellow-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">やや混雑</button>
            <button onclick="updateStatus('${booth.id}', '混雑しています', this)" class="bg-white hover:bg-red-50 text-red-600 border border-red-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">混雑</button>
          </div>
        `;
        container.appendChild(section);
      });

      switchView('admin');
    }

    async function updateStatus(id, newStatus, btnElement) {
      const buttons = btnElement.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);
      const originalText = btnElement.innerText;
      btnElement.innerText = '送信中...';

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ id: id, status: newStatus })
        });
        const result = await response.json();

        if (result.status === 'success') {
          const currentBadge = document.getElementById(`current-${id}`);
          currentBadge.innerText = newStatus;
          currentBadge.className = `px-2 py-0.5 rounded text-xs font-bold ${getStatusClass(newStatus)}`;
        } else {
          alert('更新に失敗しました: ' + result.message);
        }
      } catch (error) {
        alert('通信エラーが発生しました: ' + error.message);
      } finally {
        buttons.forEach(b => b.disabled = false);
        btnElement.innerText = originalText;
      }
    }

    function getStatusClass(status) {
      switch(status) {
        case '空いています': return 'bg-green-100 text-green-800';
        case 'やや混雑': return 'bg-yellow-100 text-yellow-800';
        case '混雑しています': return 'bg-red-100 text-red-800';
        default: return 'bg-gray-100 text-gray-800';
      }
    }

    function formatTime(dateStr) {
      if (!dateStr) return '未更新';
      const diff = new Date() - new Date(dateStr);
      const mins = Math.floor(diff / 1000 / 60);
      if (mins < 1) return 'たった今';
      if (mins < 60) return `${mins}分前`;
      return new Date(dateStr).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
  </script>
</body>
</html>
