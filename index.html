<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黒工文化祭 リアルタイム校内マップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 混雑度に応じたSVG動的クラス */
    .status-free { fill: #10b981; filter: drop-shadow(0 2px 4px rgba(16,185,129,0.2)); }
    .status-warn { fill: #fbbf24; filter: drop-shadow(0 2px 4px rgba(251,191,36,0.2)); }
    .status-busy { fill: #ef4444; filter: drop-shadow(0 2px 4px rgba(239,68,68,0.4)); animation: pulse 2s infinite; }
    .status-unknown { fill: #cbd5e1; }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="bg-gradient-to-r from-red-700 to-slate-800 text-white p-4 shadow-md sticky top-0 z-50">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-lg font-black tracking-wider">黒工文化祭 案内システム</h1>
          <p class="text-[10px] opacity-75">電子科特設：ビジュアル校舎マップ</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="fetchStatus()" class="hover:opacity-80 active:scale-95 transition text-[11px] bg-slate-700 px-2 py-1 rounded border border-slate-600 font-bold text-white">
            🔄 <span id="sync-timer">45</span>s
          </button>
          <span id="connection-badge" class="bg-emerald-500 text-[10px] px-2 py-1 rounded-full font-bold">同期中</span>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 space-y-4">
      
      <div id="error-banner" class="hidden bg-rose-50 border-l-4 border-rose-500 p-3 rounded shadow-sm">
        <p class="text-xs text-rose-700 font-bold">🚨 同期一時失敗: 自動リトライ中...</p>
        <p id="error-details" class="text-[10px] text-rose-500 mt-1 font-mono"></p>
      </div>

      <div id="loading-view" class="flex flex-col items-center justify-center py-12">
        <div class="animate-spin h-10 w-10 border-4 border-red-700 border-t-transparent rounded-full mb-3"></div>
        <p class="text-slate-500 font-bold text-xs tracking-widest">グラフィカルマップ構築中...</p>
      </div>

      <div id="auth-view" class="hidden py-10 text-center space-y-4">
        <h2 class="text-base font-black text-slate-700">🔧 管理者コントロール認証</h2>
        <input type="password" id="admin-password" placeholder="パスワードを入力" class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-center focus:outline-none focus:border-red-600 transition font-bold tracking-widest">
        <button onclick="verifyAdmin()" class="w-full bg-red-700 hover:bg-red-800 text-white font-black py-3 rounded-xl shadow-md transition">認証する</button>
        <p id="auth-error" class="text-rose-600 text-xs font-bold hidden">🚨 パスワードが正しくありません</p>
      </div>

      <div id="user-view" class="hidden space-y-4">
        
        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200 shadow-sm space-y-3">
          <div class="flex justify-between items-center">
            <h2 class="text-xs font-black text-slate-700 flex items-center gap-1">🗺️ リアルタイム校舎形状・経路マップ</h2>
            <div class="flex bg-slate-200 p-0.5 rounded-lg text-[10px] font-bold">
              <button id="btn-floor-1" onclick="switchFloor(1)" class="px-2 py-1 rounded-md bg-white text-slate-800 shadow-sm transition">1階</button>
              <button id="btn-floor-2" onclick="switchFloor(2)" class="px-2 py-1 rounded-md text-slate-500 transition">2階</button>
            </div>
          </div>

          <div class="bg-white border border-slate-300 rounded-xl p-1 shadow-inner relative">
            
            <svg id="svg-floor-1" viewBox="0 0 400 420" class="w-full h-auto">
              <path d="M 50,70 L 350,70 L 350,210 L 220,210 L 220,340" fill="none" stroke="#e2e8f0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M 50,70 L 350,70 L 350,210 L 220,210 L 220,340" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round" stroke-linejoin="round"/>
              
              <text x="20" y="30" class="text-[10px] font-bold fill-slate-400">■ 第2校舎 (1F)</text>
              
              <g id="svg-cell-1" class="transition-all duration-500 cursor-pointer">
                <rect x="30" y="45" width="100" height="50" rx="6" class="status-unknown"/>
                <text x="80" y="68" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">電子科</text>
                <text id="svg-status-text-1" x="80" y="82" text-anchor="middle" class="text-[9px] fill-white opacity-95 pointer-events-none">読み込み中</text>
              </g>
              
              <g id="svg-cell-2" class="transition-all duration-500 cursor-pointer">
                <rect x="140" y="45" width="100" height="50" rx="6" class="status-unknown"/>
                <text x="190" y="68" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">電気科</text>
                <text id="svg-status-text-2" x="190" y="82" text-anchor="middle" class="text-[9px] fill-white opacity-95 pointer-events-none">読み込み中</text>
              </g>
              
              <g id="svg-cell-3" class="transition-all duration-500 cursor-pointer">
                <rect x="250" y="45" width="120" height="50" rx="6" class="status-unknown"/>
                <text x="310" y="68" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">機械科</text>
                <text id="svg-status-text-3" x="310" y="82" text-anchor="middle" class="text-[9px] fill-white opacity-95 pointer-events-none">読み込み中</text>
              </g>

              <line x1="310" y1="95" x2="310" y2="135" stroke="#cbd5e1" stroke-width="8" stroke-dasharray="2 2"/>
              <text x="320" y="115" class="text-[8px] font-bold fill-slate-400">渡り廊下</text>

              <text x="20" y="125" class="text-[10px] font-bold fill-slate-400">■ 第1校舎本館 (1F)</text>
              <g id="svg-cell-4" class="transition-all duration-500 cursor-pointer">
                <rect x="30" y="140" width="150" height="50" rx="6" class="status-unknown"/>
                <text x="105" y="165" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">受付・本部・M科</text>
                <text id="svg-status-text-4" x="105" y="180" text-anchor="middle" class="text-[9px] fill-white opacity-90 pointer-events-none">-</text>
              </g>
              <g id="svg-cell-5" class="transition-all duration-500 cursor-pointer">
                <rect x="190" y="140" width="90" height="50" rx="6" class="status-unknown"/>
                <text x="235" y="165" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">土木/建築</text>
                <text id="svg-status-text-5" x="235" y="180" text-anchor="middle" class="text-[9px] fill-white opacity-90 pointer-events-none">-</text>
              </g>
              <g id="svg-cell-6" class="transition-all duration-500 cursor-pointer">
                <rect x="290" y="140" width="90" height="50" rx="6" class="status-unknown"/>
                <text x="335" y="165" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">商業/工経</text>
                <text id="svg-status-text-6" x="335" y="180" text-anchor="middle" class="text-[9px] fill-white opacity-90 pointer-events-none">-</text>
              </g>

              <line x1="220" y1="190" x2="220" y2="250" stroke="#cbd5e1" stroke-width="8" stroke-dasharray="2 2"/>

              <text x="20" y="235" class="text-[10px] font-bold fill-slate-400">■ 独立棟エリア</text>
              <g id="svg-cell-8" class="transition-all duration-500 cursor-pointer">
                <rect x="30" y="255" width="150" height="60" rx="8" class="status-unknown"/>
                <text x="105" y="285" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">体育館イベント</text>
                <text id="svg-status-text-8" x="105" y="300" text-anchor="middle" class="text-[9px] fill-white opacity-90 pointer-events-none">-</text>
              </g>
              <g id="svg-cell-7" class="transition-all duration-500 cursor-pointer">
                <rect x="200" y="255" width="170" height="60" rx="8" class="status-unknown"/>
                <text x="285" y="285" text-anchor="middle" class="booth-title text-[10px] font-black fill-white pointer-events-none">実習棟群</text>
                <text id="svg-status-text-7" x="285" y="300" text-anchor="middle" class="text-[9px] fill-white opacity-90 pointer-events-none">-</text>
              </g>
            </svg>

            <svg id="svg-floor-2" viewBox="0 0 400 420" class="w-full h-auto hidden">
              <text x="20" y="30" class="text-[10px] font-bold fill-slate-400">■ 第2校舎 (2F)</text>
              <rect x="30" y="45" width="340" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4 4"/>
              <text x="200" y="75" text-anchor="middle" class="text-[11px] font-bold fill-slate-400">2F 各科教室（※一般立ち入り制限区画）</text>

              <text x="20" y="125" class="text-[10px] font-bold fill-slate-400">■ 第1校舎本館 (2F)</text>
              <rect x="30" y="140" width="340" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-dasharray="4 4"/>
              <text x="200" y="170" text-anchor="middle" class="text-[11px] font-bold fill-slate-400">2F 特別教室 / 本部準備室</text>
            </svg>

          </div>
          <p class="text-[8px] text-slate-400 text-center">※校舎をタップすると下部の一覧へ自動スクロールします。</p>
        </div>

        <div class="space-y-2">
          <h2 class="text-xs font-black text-slate-700 flex items-center gap-1">📋 各ブース詳細一覧</h2>
          <div id="booth-list" class="space-y-2"></div>
        </div>
      </div>

      <div id="admin-view" class="hidden space-y-4">
        <div class="flex justify-between items-center border-b-2 border-red-600 pb-2">
          <h2 class="text-sm font-black text-red-700 tracking-wide">🔧 管理者コンソール</h2>
          <span class="bg-red-100 text-red-800 text-[9px] px-2 py-0.5 rounded font-bold">認証済</span>
        </div>
        <div id="admin-booth-list" class="space-y-3"></div>
      </div>

    </main>

    <footer class="p-4 bg-slate-800 text-white text-center text-[10px] font-medium tracking-wider">
      &copy; 2026 岩手県立黒沢尻工業高等学校 電子科
    </footer>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyUZHslRZ6m6S57v25jhUfZy8m_tP6f_cjyunYr196zL6VTF03BHUKTJMZyAJ5q9WBd/exec';
    const ADMIN_PASS = 'kuroko2026';

    let isAdminMode = false;
    let cachedData = null;
    let nextSyncCountdown = 45;
    let countdownInterval = null;

    const STATUS_MAP = {
      '空いています': { badge: 'bg-emerald-100 text-emerald-800', svgClass: 'status-free', emoji: '🟢', text: '空き' },
      'やや混雑': { badge: 'bg-amber-100 text-amber-800', svgClass: 'status-warn', emoji: '🟡', text: 'やや混雑' },
      '混雑しています': { badge: 'bg-rose-100 text-rose-800', svgClass: 'status-busy', emoji: '🔴', text: '混雑' }
    };

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('mode') === 'admin') {
        isAdminMode = true;
        switchView('auth');
      } else {
        const localData = localStorage.getItem('kuroko_map_cache');
        if (localData) {
          cachedData = JSON.parse(localData);
          renderUserView(cachedData);
        }
        fetchStatus();
        startCountdown();
      }
    });

    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      nextSyncCountdown = 45;
      const timerEl = document.getElementById('sync-timer');
      countdownInterval = setInterval(() => {
        nextSyncCountdown--;
        if (timerEl) timerEl.textContent = nextSyncCountdown;
        if (nextSyncCountdown <= 0) {
          fetchStatus();
        }
      }, 1000);
    }

    function switchView(view) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('admin-view').classList.add('hidden');
      
      if (view === 'loading') document.getElementById('loading-view').classList.remove('hidden');
      if (view === 'auth') document.getElementById('auth-view').classList.remove('hidden');
      if (view === 'user') document.getElementById('user-view').classList.remove('hidden');
      if (view === 'admin') document.getElementById('admin-view').classList.remove('hidden');
    }

    function verifyAdmin() {
      if (document.getElementById('admin-password').value === ADMIN_PASS) {
        switchView('loading');
        fetchStatus();
      } else {
        document.getElementById('auth-error').classList.remove('hidden');
      }
    }

    function switchFloor(floorNum) {
      const f1 = document.getElementById('svg-floor-1');
      const f2 = document.getElementById('svg-floor-2');
      const btnF1 = document.getElementById('btn-floor-1');
      const btnF2 = document.getElementById('btn-floor-2');

      if (floorNum === 1) {
        f1.classList.remove('hidden'); f2.classList.add('hidden');
        btnF1.className = "px-2 py-1 rounded-md bg-white text-slate-800 shadow-sm transition";
        btnF2.className = "px-2 py-1 rounded-md text-slate-500 transition";
      } else {
        f1.classList.add('hidden'); f2.classList.remove('hidden');
        btnF1.className = "px-2 py-1 rounded-md text-slate-500 transition";
        btnF2.className = "px-2 py-1 rounded-md bg-white text-slate-800 shadow-sm transition";
      }
    }

    async function fetchStatus() {
      const errorBanner = document.getElementById('error-banner');
      const errorDetails = document.getElementById('error-details');
      const connectionBadge = document.getElementById('connection-badge');

      try {
        const response = await fetch(`${GAS_URL}?_=${Date.now()}`, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        
        errorBanner.classList.add('hidden');
        connectionBadge.className = "bg-emerald-500 text-[10px] px-2 py-1 rounded-full font-bold";
        connectionBadge.textContent = "同期中";

        cachedData = data;
        localStorage.setItem('kuroko_map_cache', JSON.stringify(data));
        
        if (isAdminMode) renderAdminView(data); else renderUserView(data);
        startCountdown();

      } catch (error) {
        console.error(error);
        errorBanner.classList.remove('hidden');
        errorDetails.textContent = error.message;
        connectionBadge.className = "bg-rose-500 text-[10px] px-2 py-1 rounded-full font-bold animate-pulse";
        connectionBadge.textContent = "切断";
      }
    }

    function renderUserView(data) {
      const listContainer = document.getElementById('booth-list');
      listContainer.innerHTML = '';

      data.forEach(booth => {
        const cleanId = String(booth.id).trim();
        const config = STATUS_MAP[booth.status] || { badge: 'bg-slate-100 text-slate-800', emoji: '⚪', text: booth.status, svgClass: 'status-unknown' };

        // 1. リスト生成
        const card = document.createElement('div');
        card.id = `card-${cleanId}`;
        card.className = 'p-3 bg-white rounded-xl border border-slate-200 shadow-sm flex justify-between items-center transition-all duration-300';
        card.innerHTML = `
          <div>
            <h3 class="text-xs font-bold text-slate-800">${booth.name}</h3>
            <p class="text-[9px] text-slate-400 mt-0.5">最終更新: ${formatTime(booth.time)}</p>
          </div>
          <span class="px-2 py-1 rounded-full text-[10px] font-black ${config.badge}">${config.emoji} ${config.text}</span>
        `;
        listContainer.appendChild(card);

        // 2. SVGへの動的結合マッピング (ID: 1, 2, 3 を含む全ID対象)
        const svgGroup = document.getElementById(`svg-cell-${cleanId}`);
        const svgStatusText = document.getElementById(`svg-status-text-${cleanId}`);
        
        if (svgGroup) {
          const rect = svgGroup.querySelector('rect');
          if (rect) {
            rect.setAttribute('class', `transition-all duration-500 ${config.svgClass}`);
          }
          const titleEl = svgGroup.querySelector('.booth-title');
          if (titleEl) {
            titleEl.textContent = booth.name; // スプレッドシート側の科名に同期
          }
          
          // タップ連動スクロールイベントの設置
          svgGroup.onclick = () => {
            const targetCard = document.getElementById(`card-${cleanId}`);
            if (targetCard) {
              targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
              targetCard.classList.add('ring-4', 'ring-red-500');
              setTimeout(() => targetCard.classList.remove('ring-4', 'ring-red-500'), 1500);
            }
          };
        }
        if (svgStatusText) {
          svgStatusText.textContent = config.text;
        }
      });
      switchView('user');
    }

    function renderAdminView(data) {
      const container = document.getElementById('admin-booth-list');
      if (container.children.length === 0) {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const config = STATUS_MAP[booth.status] || { badge: 'bg-slate-100 text-slate-800' };
          const section = document.createElement('div');
          section.className = 'p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-3';
          section.innerHTML = `
            <div class="flex justify-between items-center border-b border-slate-200 pb-2">
              <h3 class="text-xs font-bold text-slate-800">ID:${cleanId} - ${booth.name}</h3>
              <span id="current-${cleanId}" class="px-2 py-0.5 rounded text-[10px] font-bold ${config.badge}">${booth.status}</span>
            </div>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="updateStatus('${cleanId}', '空いています', this)" class="bg-white hover:bg-emerald-50 text-emerald-600 border border-emerald-200 text-[10px] font-bold py-2 rounded-lg transition shadow-sm">空き</button>
              <button onclick="updateStatus('${cleanId}', 'やや混雑', this)" class="bg-white hover:bg-amber-50 text-amber-600 border border-amber-200 text-[10px] font-bold py-2 rounded-lg transition shadow-sm">やや混雑</button>
              <button onclick="updateStatus('${cleanId}', '混雑しています', this)" class="bg-white hover:bg-rose-50 text-rose-600 border border-rose-200 text-[10px] font-bold py-2 rounded-lg transition shadow-sm">混雑</button>
            </div>
          `;
          container.appendChild(section);
        });
      } else {
        data.forEach(booth => {
          const cleanId = String(booth.id).trim();
          const badge = document.getElementById(`current-${cleanId}`);
          if (badge && !badge.dataset.updating) {
            badge.innerText = booth.status;
            badge.className = `px-2 py-0.5 rounded text-[10px] font-bold ${STATUS_MAP[booth.status]?.badge || 'bg-slate-100 text-slate-800'}`;
          }
        });
      }
      switchView('admin');
    }

    async function updateStatus(id, newStatus, btnElement) {
      const badge = document.getElementById(`current-${id}`);
      if (badge) badge.dataset.updating = "true";
      const buttons = btnElement.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify({ id: id, status: newStatus })
        });
        const result = await response.json();
        if (result.status === 'success' && badge) {
          badge.innerText = newStatus;
          badge.className = `px-2 py-0.5 rounded text-[10px] font-bold ${STATUS_MAP[newStatus]?.badge || 'bg-slate-100 text-slate-800'}`;
        }
      } catch (error) {
        alert('送信失敗しました');
      } finally {
        buttons.forEach(b => b.disabled = false);
        if (badge) delete badge.dataset.updating;
      }
    }

    function formatTime(dateStr) {
      if (!dateStr) return '未更新';
      const diff = new Date() - new Date(dateStr);
      const mins = Math.floor(diff / 1000 / 60);
      if (mins < 1) return 'たった今';
      if (mins < 60) return `${mins}分前`;
      return new Date(dateStr).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
  </script>
</body>
</html>
