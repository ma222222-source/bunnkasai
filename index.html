<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭 混雑状況＆校内マップ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="bg-gradient-to-r from-indigo-700 to-purple-800 text-white p-5 text-center shadow-md">
      <h1 class="text-xl font-black tracking-wider">電子科 文化祭案内システム</h1>
      <p class="text-xs opacity-80 mt-1">リアルタイム混雑マップ（15秒自動更新）</p>
    </header>

    <main class="flex-1 p-4 space-y-6">

      <div id="loading-view" class="flex flex-col items-center justify-center py-12">
        <div class="animate-spin h-12 w-12 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
        <p id="loading-text" class="text-gray-500 font-bold text-sm tracking-widest">データを同期中...</p>
        <p id="retry-text" class="hidden text-indigo-400 font-bold text-xs tracking-widest mt-2"></p>

        <div id="debug-error" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-left font-mono text-xs space-y-2 w-full break-all">
          <p class="font-bold border-b border-red-200 pb-1 text-center">🚨 同期失敗の詳細レポート</p>
          <div id="error-details"></div>
          <button onclick="manualRetry()" class="w-full mt-2 bg-indigo-600 text-white font-bold py-2 rounded-lg shadow-sm text-xs">今すぐ再試行</button>
        </div>
      </div>

      <div id="auth-view" class="hidden py-10 text-center space-y-4">
        <h2 class="text-lg font-bold text-gray-700">管理者コントロール認証</h2>
        <input type="password" id="admin-password" placeholder="パスワードを入力" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-center focus:outline-none focus:border-indigo-500 transition">
        <button onclick="verifyAdmin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">認証</button>
        <p id="auth-error" class="text-red-500 text-xs hidden">パスワードが正しくありません</p>
      </div>

      <div id="user-view" class="hidden space-y-6">
        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm">
          <h2 class="text-sm font-black text-gray-700 mb-3 flex items-center gap-1">🗺️ リアルタイム校内マップ</h2>

          <div id="dynamic-map-container" class="grid grid-cols-2 gap-3 p-2 bg-gray-200 rounded-xl"></div>

          <p class="text-[10px] text-gray-400 mt-2 text-center">※混雑度に応じてマップの色が自動で変わります。</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-sm font-black text-gray-700 flex items-center gap-1">📋 ブース一覧</h2>
          <div id="booth-list" class="space-y-3"></div>
        </div>

        <div id="user-stale-banner" class="hidden text-center text-[10px] text-amber-600 bg-amber-50 border border-amber-200 rounded-lg py-2 px-3">
          ⚠️ 通信が不安定です。表示中のデータは最新でない可能性があります（自動で再接続を試みています）。
        </div>
      </div>

      <div id="admin-view" class="hidden space-y-4">
        <div id="admin-booth-list" class="space-y-4"></div>
        <div id="admin-stale-banner" class="hidden text-center text-[10px] text-amber-600 bg-amber-50 border border-amber-200 rounded-lg py-2 px-3">
          ⚠️ 通信が不安定です。再接続を試みています…
        </div>
      </div>

    </main>

    <footer class="p-4 bg-gray-50 border-t border-gray-200 text-center text-xs text-gray-400 font-medium">
      &copy; 2026 黒沢尻工業高校 電子科 文化祭システム
    </footer>
  </div>

  <script>
    // ===================================================================
    // 文化祭 混雑状況＆校内マップ - フロントエンド（究極堅牢版）
    // ===================================================================
    // 【このバージョンの設計方針】
    // 1. fetch失敗（Failed to fetch / CORS / タイムアウト）が発生しても、
    //    画面をクラッシュさせない。初回ロード成功前は3秒後に自動で
    //    サイレント再試行を行う（指数バックオフ付き、最大遅延30秒）。
    // 2. 一度でも表示に成功した後の定期更新（15秒ごと）が失敗しても、
    //    既存の表示はそのまま維持し、裏側で静かにリトライを続ける。
    //    ユーザーには軽い「不安定です」バナーのみ表示し、画面全体は
    //    壊さない。
    // 3. GASからのレスポンスがどんな形（新形式の一貫オブジェクト /
    //    旧形式の素の配列 / 壊れたJSON）であっても、安全にパースし、
    //    クリーンな配列として扱う「正規化レイヤー」を必ず通す。
    // ===================================================================

    // --- 環境変数設定 ---
    const LIFF_ID = '2010429448-fUV9jRNs';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycwb2H0bVNqGUlPMxro-z4I4F7VoylYKX3IFJSq_ExAMERxg1QC0YWzhhuFrBIDIXJbB/exec';
    const ADMIN_PASS = 'kuroko2026';

    // --- リトライ設定 ---
    const RETRY_BASE_DELAY_MS = 3000;   // 初回リトライ待機（要件: 3秒後に自動再試行）
    const RETRY_MAX_DELAY_MS = 30000;   // バックオフの上限（30秒）
    const FETCH_TIMEOUT_MS = 10000;     // 1回のfetchのタイムアウト
    const AUTO_REFRESH_INTERVAL_MS = 15000; // 通常時の定期更新間隔

    let isAdminMode = false;
    let autoRefreshInterval = null;
    let retryTimer = null;
    let retryCount = 0;
    let hasEverLoadedSuccessfully = false;
    let isFetchInFlight = false;

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const liffState = urlParams.get('liff.state');
      if (urlParams.get('mode') === 'admin' || (liffState && liffState.includes('mode=admin'))) {
        isAdminMode = true;
      }
      initLiff();
    });

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        if (isAdminMode) {
          switchView('auth');
        } else {
          await fetchStatus();
          startAutoRefresh();
        }
      } catch (error) {
        // LIFF初期化自体の失敗もサイレントリトライ対象にする。
        // （LINE内ブラウザの強力なキャッシュ等で稀に発生するため）
        scheduleSilentRetry('LIFF初期化フェーズ', error && error.message ? error.message : String(error), () => initLiff());
      }
    }

    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(() => {
        if (document.visibilityState === 'visible') {
          fetchStatus(true);
        }
      }, AUTO_REFRESH_INTERVAL_MS);
    }

    function switchView(view) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('admin-view').classList.add('hidden');
      if (view === 'loading') document.getElementById('loading-view').classList.remove('hidden');
      if (view === 'auth') document.getElementById('auth-view').classList.remove('hidden');
      if (view === 'user') document.getElementById('user-view').classList.remove('hidden');
      if (view === 'admin') document.getElementById('admin-view').classList.remove('hidden');
    }

    function verifyAdmin() {
      if (document.getElementById('admin-password').value === ADMIN_PASS) {
        switchView('loading');
        resetRetryState();
        fetchStatus().then(() => startAutoRefresh());
      } else {
        document.getElementById('auth-error').classList.remove('hidden');
      }
    }

    // -------------------------------------------------------------
    // 通信ロジック本体
    // -------------------------------------------------------------

    /**
     * ステータス取得。
     * @param {boolean} isBackground - trueの場合は定期更新（既に画面表示済み）。
     *   失敗してもエラー画面に切り替えず、裏側で静かにリトライする。
     */
    async function fetchStatus(isBackground = false) {
      if (isFetchInFlight) return; // 多重実行防止（リトライタイマーと定期更新の競合対策）
      isFetchInFlight = true;

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

        // ブラウザ（特にLINE内ブラウザ）の強力なキャッシュを物理的に破壊するため、
        // タイムスタンプ＋ランダム値をURL末尾に強制付与
        const cacheBuster = GAS_URL + (GAS_URL.includes('?') ? '&' : '?') +
          '_=' + new Date().getTime() + '_' + Math.random().toString(36).slice(2);

        let response;
        try {
          response = await fetch(cacheBuster, {
            method: 'GET',
            mode: 'cors',
            cache: 'no-store',
            signal: controller.signal
          });
        } finally {
          clearTimeout(timeoutId);
        }

        if (!response.ok) {
          throw new Error(`HTTPエラー発生。ステータスコード: ${response.status} (${response.statusText})`);
        }

        let rawJson;
        try {
          rawJson = await response.json();
        } catch (parseError) {
          // JSONとして壊れている場合も「Load failed」的なクラッシュにせず、
          // 通信エラーと同じ扱いでリトライに回す。
          throw new Error('サーバーからの応答を解析できませんでした（不正なJSON）。');
        }

        const normalized = normalizeApiResponse_(rawJson);

        if (!normalized.ok) {
          throw new Error(normalized.message || 'GAS側でエラーが返されました。');
        }

        // --- 成功 ---
        hasEverLoadedSuccessfully = true;
        clearRetrySchedule();
        hideStaleBanner();
        hideDebugError();

        if (isAdminMode) {
          renderAdminView(normalized.data);
        } else {
          renderUserView(normalized.data);
        }

      } catch (error) {
        const message = (error && error.message) ? error.message : String(error);
        handleFetchFailure_(isBackground, '通信フェーズ (API接続失敗)', message);
      } finally {
        isFetchInFlight = false;
      }
    }

    /**
     * GASからの応答を「クリーンな配列」に正規化する正規化レイヤー。
     * 想定する入力パターン：
     *  - 新形式: { status: "success"|"error", data: [...], message: "" }
     *  - 旧形式: [ {...}, {...} ]（素の配列がそのまま返ってくる場合）
     *  - 旧形式エラー: { status: "error", message: "..." }
     *  - 想定外の値（null, 文字列, 数値など）
     * いずれの場合でも例外を投げず、{ ok, data, message } を返す。
     */
    function normalizeApiResponse_(rawJson) {
      try {
        // 新形式・旧エラー形式: オブジェクトで status を持つ場合
        if (rawJson && typeof rawJson === 'object' && !Array.isArray(rawJson) && 'status' in rawJson) {
          if (rawJson.status === 'error') {
            return { ok: false, data: [], message: rawJson.message || 'サーバーがエラーを返しました。' };
          }
          // status: "success" 想定。data が配列でなければ空配列にフォールバック。
          const data = Array.isArray(rawJson.data) ? rawJson.data : [];
          return { ok: true, data: sanitizeBoothArray_(data), message: '' };
        }

        // 旧形式: 素の配列がそのまま返ってくる場合
        if (Array.isArray(rawJson)) {
          return { ok: true, data: sanitizeBoothArray_(rawJson), message: '' };
        }

        // それ以外の想定外の形式
        return { ok: false, data: [], message: 'サーバーからの応答形式が不正です。' };
      } catch (e) {
        return { ok: false, data: [], message: '応答の正規化中にエラーが発生しました: ' + (e && e.message ? e.message : '') };
      }
    }

    /**
     * ブース配列の各要素を安全な形に整形する。
     * id が無い要素は除外し、name/status/time は安全な文字列に補完する。
     * これにより、サーバー側の不備があってもフロントエンドが
     * 例外（undefined.trim() 等）でクラッシュすることはない。
     */
    function sanitizeBoothArray_(arr) {
      const out = [];
      if (!Array.isArray(arr)) return out;
      for (let i = 0; i < arr.length; i++) {
        try {
          const item = arr[i];
          if (!item || typeof item !== 'object') continue;
          const id = (item.id === null || item.id === undefined) ? '' : String(item.id).trim();
          if (id === '') continue; // IDが無いデータは表示できないため除外
          const name = (item.name === null || item.name === undefined || String(item.name).trim() === '')
            ? '(名称未設定)' : String(item.name);
          const status = (item.status === null || item.status === undefined || String(item.status).trim() === '')
            ? '未設定' : String(item.status);
          const time = (item.time === null || item.time === undefined) ? '' : item.time;
          out.push({ id, name, status, time });
        } catch (e) {
          continue; // 1件の異常はスキップして継続
        }
      }
      return out;
    }

    /**
     * fetch失敗時の分岐処理。
     * - 初回ロード前（hasEverLoadedSuccessfully === false）:
     *     ローディング画面を維持したまま、3秒後（以降は指数バックオフ）に
     *     サイレント再試行する。デバッグ情報はuser向けに薄く表示するが、
     *     画面はクラッシュさせない。
     * - 既に表示成功済みの場合:
     *     既存のUIを保持したまま、裏側で静かにリトライし続ける。
     *     軽い「不安定です」バナーのみ表示する。
     */
    function handleFetchFailure_(isBackground, phase, message) {
      if (!hasEverLoadedSuccessfully) {
        // まだ一度も表示できていない＝起動直後の通信失敗
        showDebugError(phase, message);
        scheduleSilentRetry(phase, message, () => fetchStatus(false));
      } else {
        // 既に表示済みなら画面は壊さず、バナーのみ出してリトライを継続
        showStaleBanner();
        if (!isBackground) {
          // 明示的なリトライ呼び出し（手動再試行ボタン等）からの失敗は
          // 念のためリトライスケジュールにも乗せておく。
          scheduleSilentRetry(phase, message, () => fetchStatus(true));
        } else {
          // 定期更新の失敗は、次の15秒ごとのintervalに任せても良いが、
          // 反応を早めるため短いサイレントリトライも仕込んでおく。
          scheduleSilentRetry(phase, message, () => fetchStatus(true));
        }
      }
    }

    /**
     * サイレント自動リトライをスケジュールする（要件1の中核実装）。
     * 3秒 → 6秒 → 12秒 ... と指数的に増加し、最大30秒でキャップする。
     * 既にタイマーが動いている場合は重複登録しない。
     */
    function scheduleSilentRetry(phase, message, retryFn) {
      if (retryTimer) return; // 既にリトライ待機中なら多重スケジュールしない

      const delay = Math.min(RETRY_BASE_DELAY_MS * Math.pow(2, retryCount), RETRY_MAX_DELAY_MS);
      retryCount += 1;
      updateRetryIndicator_(delay);

      retryTimer = setTimeout(() => {
        retryTimer = null;
        retryFn();
      }, delay);
    }

    function clearRetrySchedule() {
      if (retryTimer) {
        clearTimeout(retryTimer);
        retryTimer = null;
      }
      retryCount = 0;
      const retryText = document.getElementById('retry-text');
      if (retryText) retryText.classList.add('hidden');
    }

    function resetRetryState() {
      clearRetrySchedule();
      hasEverLoadedSuccessfully = false;
    }

    /**
     * ユーザーが「今すぐ再試行」ボタンを押したときの即時リトライ。
     */
    function manualRetry() {
      clearRetrySchedule();
      fetchStatus(false);
    }

    function updateRetryIndicator_(delayMs) {
      const retryText = document.getElementById('retry-text');
      if (!retryText) return;
      const seconds = Math.round(delayMs / 1000);
      retryText.textContent = `${seconds}秒後に自動で再接続します…`;
      retryText.classList.remove('hidden');
    }

    function showStaleBanner() {
      const userBanner = document.getElementById('user-stale-banner');
      const adminBanner = document.getElementById('admin-stale-banner');
      if (isAdminMode) {
        if (adminBanner) adminBanner.classList.remove('hidden');
      } else {
        if (userBanner) userBanner.classList.remove('hidden');
      }
    }

    function hideStaleBanner() {
      const userBanner = document.getElementById('user-stale-banner');
      const adminBanner = document.getElementById('admin-stale-banner');
      if (userBanner) userBanner.classList.add('hidden');
      if (adminBanner) adminBanner.classList.add('hidden');
    }

    function showDebugError(phase, msg) {
      const errBox = document.getElementById('debug-error');
      const details = document.getElementById('error-details');
      if (!errBox || !details) return;

      details.innerHTML = `
        <p><b>発生箇所:</b> ${escapeHtml_(phase)}</p>
        <p><b>エラー原因:</b> ${escapeHtml_(msg)}</p>
        <p><b>現在のGAS設定URL:</b><br><span class="text-[10px] bg-white p-1 block rounded mt-1 border border-red-100">${escapeHtml_(GAS_URL)}</span></p>
        <p class="mt-2 text-gray-500 text-[10px]">※自動で再試行を続けています。GASのデプロイ設定（「アクセスできるユーザー」を「全員」にしているか）やURLの間違い、一時的な通信制限の可能性があります。</p>
      `;
      errBox.classList.remove('hidden');
    }

    function hideDebugError() {
      const errBox = document.getElementById('debug-error');
      if (errBox) errBox.classList.add('hidden');
    }

    function escapeHtml_(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // -------------------------------------------------------------
    // 描画ロジック
    // -------------------------------------------------------------

    function renderUserView(data) {
      try {
        const listContainer = document.getElementById('booth-list');
        const mapContainer = document.getElementById('dynamic-map-container');
        if (!listContainer || !mapContainer) return;

        const boothArray = Array.isArray(data) ? data : [];

        listContainer.innerHTML = '';

        if (mapContainer.children.length === 0) {
          boothArray.forEach(booth => {
            try {
              const cleanId = String(booth.id).trim();
              const cell = document.createElement('div');
              cell.id = `map-cell-${cleanId}`;
              cell.className = `p-3 rounded-lg text-center font-black text-xs shadow-sm transition-all duration-500 ${getMapCellClass(booth.status)}`;
              cell.innerHTML = `
                <div>${escapeHtml_(booth.name)}</div>
                <div id="map-status-${cleanId}" class="text-[10px] font-normal mt-1">${escapeHtml_(booth.status)}</div>
              `;
              mapContainer.appendChild(cell);
            } catch (e) { /* 1件の描画失敗は無視して継続 */ }
          });
        }

        boothArray.forEach(booth => {
          try {
            const cleanId = String(booth.id).trim();

            const card = document.createElement('div');
            card.className = 'p-4 bg-white rounded-xl shadow-sm border border-gray-100 flex justify-between items-center';
            card.innerHTML = `
              <div>
                <h3 class="text-sm font-bold text-gray-800">${escapeHtml_(booth.name)}</h3>
                <p class="text-[10px] text-gray-400 mt-1">🕒 更新: ${escapeHtml_(formatTime(booth.time))}</p>
              </div>
              <span class="px-3 py-1 rounded-full text-xs font-black ${getStatusBadgeClass(booth.status)}">
                ${getStatusEmoji(booth.status)} ${escapeHtml_(booth.status)}
              </span>
            `;
            listContainer.appendChild(card);

            const cell = document.getElementById(`map-cell-${cleanId}`);
            const statusText = document.getElementById(`map-status-${cleanId}`);
            if (cell && statusText) {
              statusText.innerText = booth.status;
              cell.className = `p-3 rounded-lg text-center font-black text-xs shadow-sm transition-all duration-500 ${getMapCellClass(booth.status)}`;
            }
          } catch (e) { /* 1件の描画失敗は無視して継続 */ }
        });

        if (document.getElementById('user-view').classList.contains('hidden')) switchView('user');
      } catch (e) {
        // 描画全体が想定外に失敗した場合でも、ここで止めるだけにし、
        // 既に表示中のUIを破壊しない。
        console.error('renderUserView failed:', e);
      }
    }

    function renderAdminView(data) {
      try {
        const container = document.getElementById('admin-booth-list');
        if (!container) return;

        const boothArray = Array.isArray(data) ? data : [];

        if (container.children.length === 0) {
          boothArray.forEach(booth => {
            try {
              const cleanId = String(booth.id).trim();
              const section = document.createElement('div');
              section.className = 'p-4 bg-gray-50 border border-gray-200 rounded-xl space-y-3';
              section.innerHTML = `
                <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                  <h3 class="text-sm font-bold text-gray-800">${escapeHtml_(booth.name)}</h3>
                  <span id="current-${cleanId}" class="px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(booth.status)}">${escapeHtml_(booth.status)}</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                  <button onclick="updateStatus('${cleanId}', '空いています', this)" class="bg-white hover:bg-green-50 text-green-600 border border-green-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">空き</button>
                  <button onclick="updateStatus('${cleanId}', 'やや混雑', this)" class="bg-white hover:bg-yellow-50 text-yellow-600 border border-yellow-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">やや混雑</button>
                  <button onclick="updateStatus('${cleanId}', '混雑しています', this)" class="bg-white hover:bg-red-50 text-red-600 border border-red-200 text-xs font-bold py-2 rounded-lg transition shadow-sm">混雑</button>
                </div>
              `;
              container.appendChild(section);
            } catch (e) { /* 1件の描画失敗は無視して継続 */ }
          });
        } else {
          boothArray.forEach(booth => {
            try {
              const cleanId = String(booth.id).trim();
              const badge = document.getElementById(`current-${cleanId}`);
              if (badge && !badge.dataset.updating) {
                badge.innerText = booth.status;
                badge.className = `px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(booth.status)}`;
              }
            } catch (e) { /* 1件の更新失敗は無視して継続 */ }
          });
        }
        if (document.getElementById('admin-view').classList.contains('hidden')) switchView('admin');
      } catch (e) {
        console.error('renderAdminView failed:', e);
      }
    }

    /**
     * ステータス更新（管理者操作）。
     * こちらも通信失敗時にアプリ全体をクラッシュさせず、
     * 失敗時は3秒後に自動でサイレント再送する。
     */
    async function updateStatus(id, newStatus, btnElement, attempt = 0) {
      const badge = document.getElementById(`current-${id}`);
      if (badge) badge.dataset.updating = "true";
      const buttons = btnElement && btnElement.parentElement
        ? btnElement.parentElement.querySelectorAll('button')
        : [];
      buttons.forEach(b => b.disabled = true);

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

        let response;
        try {
          response = await fetch(GAS_URL, {
            method: 'POST',
            mode: 'cors',
            cache: 'no-store',
            body: JSON.stringify({ id: id, status: newStatus })
          });
        } finally {
          clearTimeout(timeoutId);
        }

        let result;
        try {
          result = await response.json();
        } catch (parseError) {
          throw new Error('応答の解析に失敗しました（不正なJSON）。');
        }

        if (result && result.status === 'success') {
          if (badge) {
            badge.innerText = newStatus;
            badge.className = `px-2 py-0.5 rounded text-xs font-bold ${getStatusBadgeClass(newStatus)}`;
          }
        } else {
          throw new Error((result && result.message) ? result.message : '更新に失敗しました。');
        }
      } catch (error) {
        // 通信エラー時：3回まではサイレントに自動再送、それ以降はユーザーに通知
        if (attempt < 3) {
          setTimeout(() => {
            updateStatus(id, newStatus, btnElement, attempt + 1);
          }, RETRY_BASE_DELAY_MS);
          return; // finally節でのbutton解放は再送後に行うためここで抜ける
        } else {
          alert('送信に失敗しました。通信環境をご確認のうえ、もう一度お試しください。');
        }
      } finally {
        buttons.forEach(b => b.disabled = false);
        if (badge) delete badge.dataset.updating;
      }
    }

    // -------------------------------------------------------------
    // 装飾ユーティリティ
    // -------------------------------------------------------------
    function getStatusBadgeClass(status) {
      switch (status) {
        case '空いています': return 'bg-green-100 text-green-800';
        case 'やや混雑': return 'bg-yellow-100 text-yellow-800';
        case '混雑しています': return 'bg-red-100 text-red-800';
        default: return 'bg-gray-100 text-gray-800';
      }
    }

    function getMapCellClass(status) {
      switch (status) {
        case '空いています': return 'bg-green-500 text-white shadow-lg shadow-green-100';
        case 'やや混雑': return 'bg-yellow-400 text-gray-900 shadow-lg shadow-yellow-500/20';
        case '混雑しています': return 'bg-red-500 text-white shadow-lg shadow-red-500/40 animate-pulse';
        default: return 'bg-white text-gray-400';
      }
    }

    function getStatusEmoji(status) {
      switch (status) {
        case '空いています': return '🟢';
        case 'やや混雑': return '🟡';
        case '混雑しています': return '🔴';
        default: return '⚪';
      }
    }

    function formatTime(dateStr) {
      if (!dateStr) return '未更新';
      try {
        const diff = new Date() - new Date(dateStr);
        if (isNaN(diff)) return '未更新';
        const mins = Math.floor(diff / 1000 / 60);
        if (mins < 0) return '未更新';
        if (mins < 1) return 'たった今';
        if (mins < 60) return `${mins}分前`;
        return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        return '未更新';
      }
    }
  </script>
